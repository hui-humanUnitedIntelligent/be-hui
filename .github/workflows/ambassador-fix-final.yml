name: Ambassador Fix Final

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.108.0/supabase_linux_amd64.tar.gz | tar -xz -C /tmp
          sudo mv /tmp/supabase /usr/local/bin/supabase

      - name: Link
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref gxztrhvhcxhmunhhkfjd --yes

      - name: Step 1 - Deploy drop wrapper
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db query --linked -f ambassador_drop_wrapper.sql
          echo "Wrapper deployed"

      - name: Step 2 - Call drop wrapper via REST
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          curl -s -X POST "$SUPABASE_URL/rest/v1/rpc/rpc_drop_and_recreate_ambassador_funcs" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' | tee /tmp/drop_result.json
          cat /tmp/drop_result.json

      - name: Step 3 - Recreate functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db query --linked -f ambassador_recreate.sql
          echo "Functions recreated"

      - name: Step 4 - Verify
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          for fn in rpc_get_ambassador_referrals rpc_get_all_ambassadors; do
            result=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$SUPABASE_URL/rest/v1/rpc/$fn" \
              -H "apikey: $SUPABASE_SERVICE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
              -H "Content-Type: application/json" \
              -d '{"p_ambassador_id":"3a291a5c-9c4c-4537-9e87-b7b137d5ec01"}')
            echo "$fn: HTTP $result"
            [ "$result" != "404" ] && echo "✅ $fn" || (echo "❌ $fn FEHLT" && exit 1)
          done
