name: Fix Vercel Stripe Public Key

on:
  workflow_dispatch:
  push:
    branches:
      - cursor/fix-stripe-public-key-e4ef
      - main
    paths:
      - 'scripts/fix-vercel-stripe-env.sh'
      - 'scripts/resolve-stripe-publishable-key.mjs'
      - 'src/config/stripe-publishable-key.json'
      - 'src/components/commerce/StripePaymentStep.jsx'
      - '.github/workflows/fix-vercel-stripe-env.yml'

concurrency:
  group: fix-vercel-stripe-env
  cancel-in-progress: true

jobs:
  fix-and-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fix Stripe key + verify build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.108.0/supabase_linux_amd64.tar.gz | tar -xz -C /tmp
          export SUPABASE_BIN=/tmp/supabase
          bash scripts/fix-vercel-stripe-env.sh

      - name: Commit resolved publishable key
        run: |
          set -euo pipefail
          if git diff --quiet src/config/stripe-publishable-key.json; then
            echo "Keine Änderung an stripe-publishable-key.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/config/stripe-publishable-key.json
          git commit -m "chore: inject Stripe publishable key for production build"
          git push

      - name: E2E Checkout (API)
        if: success()
        env:
          SUPABASE_URL: https://gxztrhvhcxhmunhhkfjd.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASS: ${{ secrets.TEST_USER_PASS }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ANON_KEY:-}" ] || [ -z "${STRIPE_SECRET_KEY:-}" ]; then
            echo "⚠️ E2E übersprungen — fehlende Secrets"
            exit 0
          fi
          WORK_ID=$(curl -sfS \
            "${SUPABASE_URL}/rest/v1/commerce_price_authority?select=item_id&item_type=eq.work&limit=1" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY:-$SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY:-$SUPABASE_ANON_KEY}" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d[0]["item_id"] if d else "")')
          export TEST_WORK_ID="$WORK_ID"
          node e2e-test.js
