name: Stripe Payments NOT NULL Fix

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.108.0/supabase_linux_amd64.tar.gz | tar -xz -C /tmp
          sudo mv /tmp/supabase /usr/local/bin/supabase
      - name: Link
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref gxztrhvhcxhmunhhkfjd --yes
      - name: Fix
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db query --linked -f stripe_payments_not_null_fix.sql
      - name: Test rpc_record_payment
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db query --linked "SELECT rpc_record_payment('pi_test_wf','cus_test',100,'eur','work',NULL,NULL);" -o json
