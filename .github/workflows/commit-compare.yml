name: Commit Compare Result

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.108.0/supabase_linux_amd64.tar.gz | tar -xz -C /tmp
          sudo mv /tmp/supabase /usr/local/bin/supabase

      - name: Link
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref gxztrhvhcxhmunhhkfjd --yes

      - name: Query and commit result
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db query --linked "
            SELECT 
              n.nspname as schema,
              p.proname,
              pg_get_function_identity_arguments(p.oid) as identity_args,
              pg_get_function_result(p.oid) as return_type,
              pg_get_userbyid(p.proowner) as owner,
              p.prosecdef as sec_def,
              p.proacl::text as acl,
              p.proconfig::text as config
            FROM pg_proc p
            JOIN pg_namespace n ON p.pronamespace = n.oid
            WHERE p.proname IN (
              'rpc_get_ambassador_works',
              'rpc_get_ambassador_referrals',
              'rpc_get_all_ambassadors'
            )
            ORDER BY p.proname
          ;" -o json > debug_compare.json
          cat debug_compare.json
          git config user.email "ci@hui.com"
          git config user.name "HUI CI"
          git add debug_compare.json
          git diff --staged --quiet || git commit -m "debug: rpc comparison result"
          git push
