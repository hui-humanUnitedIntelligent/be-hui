name: Run Ambassador RPCs Migration
on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run Ambassador RPCs via supabase db query
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db query \
            --project-ref gxztrhvhcxhmunhhkfjd \
            < .github/migrations/ambassador_rpcs.sql
