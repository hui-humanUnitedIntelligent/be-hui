name: Run Ambassador RPCs Migration
on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Project and Run RPCs
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # Projekt verlinken
          supabase link --project-ref gxztrhvhcxhmunhhkfjd
          # SQL-Datei ausführen (-f flag für File)
          supabase db query -f .github/migrations/ambassador_rpcs.sql --linked
