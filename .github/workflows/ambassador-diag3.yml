name: Ambassador Diag3 Commit Signatures

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.108.0/supabase_linux_amd64.tar.gz | tar -xz -C /tmp
          sudo mv /tmp/supabase /usr/local/bin/supabase

      - name: Link
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref gxztrhvhcxhmunhhkfjd --yes

      - name: Get and commit signatures
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          supabase db query --linked "
            SELECT proname, oid::bigint as oid, 
                   pg_get_function_identity_arguments(oid) as args
            FROM pg_proc
            WHERE proname IN ('rpc_get_ambassador_referrals','rpc_get_all_ambassadors')
            ORDER BY proname, oid
          ;" -o json > pg_signatures_debug.json
          cat pg_signatures_debug.json
          git config user.email "ci@hui.com"
          git config user.name "HUI CI"
          git add pg_signatures_debug.json
          git diff --staged --quiet || git commit -m "debug: pg_proc signatures for ambassador RPCs"
          git push
