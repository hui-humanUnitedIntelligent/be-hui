name: Run Ambassador RPCs v2

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ambassador_rpcs_v2.sql'

concurrency:
  group: ambassador-rpcs-v2
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.108.0/supabase_linux_amd64.tar.gz | tar -xz -C /tmp
          sudo mv /tmp/supabase /usr/local/bin/supabase
          supabase --version

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref gxztrhvhcxhmunhhkfjd --yes

      - name: Run ambassador_rpcs_v2.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          supabase db execute \
            --project-ref gxztrhvhcxhmunhhkfjd \
            --file ambassador_rpcs_v2.sql
          echo "✅ Ambassador RPCs v2 deployed"
