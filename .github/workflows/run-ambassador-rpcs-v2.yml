name: Run Ambassador RPCs v2

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/run-ambassador-rpcs-v2.yml'
      - 'ambassador_rpcs_v2.sql'

concurrency:
  group: ambassador-rpcs-v2
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.108.0/supabase_linux_amd64.tar.gz | tar -xz -C /tmp
          sudo mv /tmp/supabase /usr/local/bin/supabase
          supabase --version

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref gxztrhvhcxhmunhhkfjd --yes

      - name: Run ambassador_rpcs_v2.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          supabase db query --linked -f ambassador_rpcs_v2.sql
          echo "✅ Ambassador RPCs v2 deployed"

      - name: Verify RPCs
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          FAIL=0
          for fn in rpc_validate_ambassador_name rpc_get_ambassador_ref_link rpc_get_ambassador_referrals rpc_ambassador_comment_work rpc_ambassador_comment_project rpc_ambassador_send_message rpc_ambassador_resonance; do
            count=$(supabase db query --linked "SELECT COUNT(*)::int AS c FROM pg_proc WHERE proname='${fn}';" -o json | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d[0]["c"] if d else 0)')
            if [ "$count" = "1" ]; then echo "OK $fn"; else echo "FAIL $fn"; FAIL=1; fi
          done
          exit $FAIL
