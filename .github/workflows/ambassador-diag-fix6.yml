name: Ambassador Diag + Fix6

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.108.0/supabase_linux_amd64.tar.gz | tar -xz -C /tmp
          sudo mv /tmp/supabase /usr/local/bin/supabase

      - name: Link
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref gxztrhvhcxhmunhhkfjd --yes

      - name: Exact pg_proc signatures
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db query --linked "
            SELECT proname, oid::bigint, 
                   pg_get_function_identity_arguments(oid) as args,
                   pg_get_functiondef(oid) as def_snippet
            FROM pg_proc
            WHERE proname IN ('rpc_get_ambassador_referrals','rpc_get_all_ambassadors')
            ORDER BY proname, oid
          ;" -o json

      - name: Drop by OID + redeploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db query --linked -f ambassador_fix6.sql 2>&1

      - name: Verify
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db query --linked "SELECT proname, pg_get_function_identity_arguments(oid) FROM pg_proc WHERE proname IN ('rpc_get_ambassador_referrals','rpc_get_all_ambassadors');" -o json
          supabase db query --linked "SELECT COUNT(*) FROM (SELECT rpc_get_all_ambassadors()) x;" -o json
          supabase db query --linked "SELECT COUNT(*) FROM (SELECT rpc_get_ambassador_referrals('3a291a5c-9c4c-4537-9e87-b7b137d5ec01'::uuid)) x;" -o json
