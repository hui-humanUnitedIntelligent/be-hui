name: HUI Release Guardian

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-guardian-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  guardian:
    name: Release Guardian v1.0
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Release Guardian
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
          GUARDIAN_PR_DRAFT: ${{ github.event.pull_request.draft }}
          GUARDIAN_PR_MERGED: ${{ github.event.pull_request.merged }}
          GUARDIAN_PR_MERGEABLE: ${{ github.event.pull_request.mergeable }}
          GUARDIAN_PR_STATE: ${{ github.event.pull_request.state }}
        run: npm run release-guardian:report
        continue-on-error: true
        id: guardian

      - name: Upload Guardian Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-guardian-report
          path: |
            docs/generated/release-guardian-report.md
            docs/generated/release-guardian-report.json
          retention-days: 30

      - name: Comment PR with Guardian Report
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'docs/generated/release-guardian-report.md';
            if (!fs.existsSync(reportPath)) {
              core.setFailed('Guardian report not found');
              return;
            }
            const report = fs.readFileSync(reportPath, 'utf8');

            const marker = '<!-- HUI_RELEASE_GUARDIAN -->';
            const body = `${marker}\n## HUI Release Guardian\n\n${report}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Enforce Guardian Result
        if: steps.guardian.outcome == 'failure'
        run: |
          echo "❌ Release Guardian: NICHT VERIFIZIERT"
          echo "Diese Änderung darf noch nicht als abgeschlossen bezeichnet werden."
          exit 1
