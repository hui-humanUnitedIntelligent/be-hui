name: Ambassador Fix 5

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ambassador_fix5.sql'

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.108.0/supabase_linux_amd64.tar.gz | tar -xz -C /tmp
          sudo mv /tmp/supabase /usr/local/bin/supabase

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref gxztrhvhcxhmunhhkfjd --yes

      - name: Run fix5
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db query --linked -f ambassador_fix5.sql 2>&1
          echo "Done"

      - name: Verify
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db query --linked "SELECT proname, pg_get_function_identity_arguments(oid) FROM pg_proc WHERE proname IN ('rpc_get_ambassador_referrals','rpc_get_all_ambassadors') ORDER BY proname;" -o json
          supabase db query --linked "SELECT COUNT(*) FROM (SELECT rpc_get_all_ambassadors()) x;" -o json
