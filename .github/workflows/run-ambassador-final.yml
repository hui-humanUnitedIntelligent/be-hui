name: Run Ambassador Final Migration

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ambassador_final.sql'
      - '.github/workflows/run-ambassador-final.yml'

concurrency:
  group: ambassador-final
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.108.0/supabase_linux_amd64.tar.gz | tar -xz -C /tmp
          sudo mv /tmp/supabase /usr/local/bin/supabase
          supabase --version

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref gxztrhvhcxhmunhhkfjd --yes

      - name: Run ambassador_final.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          awk '/^COMMIT;/{print; exit} {print}' ambassador_final.sql > /tmp/amb_final_tx.sql
          supabase db query --linked -f /tmp/amb_final_tx.sql
          echo "✅ Migration deployed"

      - name: Verify
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          FAIL=0
          RPCS="rpc_validate_ambassador_name rpc_get_ambassador_ref_link rpc_get_ambassador_referrals rpc_register_with_ambassador rpc_ambassador_comment_work rpc_ambassador_comment_project rpc_ambassador_send_message rpc_ambassador_resonance rpc_get_ambassador_works rpc_get_ambassador_projects rpc_get_ambassador_messages rpc_get_all_ambassadors rpc_set_ambassador_status"
          for fn in $RPCS; do
            count=$(supabase db query --linked "SELECT COUNT(*)::int AS c FROM pg_proc WHERE proname='${fn}';" -o json | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d[0]["c"] if d else 0)')
            if [ "$count" -ge "1" ]; then
              echo "✅ $fn"
            else
              echo "❌ $fn FEHLT"
              FAIL=1
            fi
          done
          # ambassador_status Spalte
          count2=$(supabase db query --linked "SELECT COUNT(*)::int AS c FROM information_schema.columns WHERE table_name='profiles' AND column_name='ambassador_status';" -o json | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d[0]["c"] if d else 0)')
          if [ "$count2" = "1" ]; then echo "✅ profiles.ambassador_status"; else echo "❌ profiles.ambassador_status FEHLT"; FAIL=1; fi
          exit $FAIL
