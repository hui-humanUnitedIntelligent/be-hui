name: Introspect Admin RLS Policy

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.108.0/supabase_linux_amd64.tar.gz | tar -xz -C /tmp
          sudo mv /tmp/supabase /usr/local/bin/supabase
      - name: Link
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref gxztrhvhcxhmunhhkfjd --yes
      - name: admin_read Policy-Definitionen
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db query --linked "SELECT tablename, policyname, qual FROM pg_policies WHERE schemaname='public' AND policyname IN ('admin_read','admin_read_refunds') ORDER BY tablename;" -o json
