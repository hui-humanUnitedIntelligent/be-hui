name: Debug Ambassador Fix

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.108.0/supabase_linux_amd64.tar.gz | tar -xz -C /tmp
          sudo mv /tmp/supabase /usr/local/bin/supabase

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref gxztrhvhcxhmunhhkfjd --yes

      - name: Check table schemas
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "=== chats columns ==="
          supabase db query --linked "SELECT column_name, data_type FROM information_schema.columns WHERE table_name='chats' ORDER BY ordinal_position;" -o json
          echo "=== comments columns ==="
          supabase db query --linked "SELECT column_name, data_type FROM information_schema.columns WHERE table_name='comments' ORDER BY ordinal_position;" -o json
          echo "=== profiles columns (ambassador-relevant) ==="
          supabase db query --linked "SELECT column_name FROM information_schema.columns WHERE table_name='profiles' AND column_name IN ('username','referred_by','is_ambassador','role','phone','display_name','first_transaction_at');" -o json
          echo "=== existing ambassador RPCs ==="
          supabase db query --linked "SELECT proname, pg_get_function_identity_arguments(oid) as args FROM pg_proc WHERE proname LIKE '%ambassador%' OR proname LIKE 'rpc_validate%' OR proname LIKE 'rpc_get_ambassador%';" -o json

      - name: Deploy missing RPCs
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db query --linked -f ambassador_fix.sql 2>&1 || echo "SQL Error (non-fatal)"

      - name: Verify all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db query --linked "SELECT proname FROM pg_proc WHERE proname IN ('rpc_validate_ambassador_name','rpc_get_ambassador_ref_link','rpc_get_ambassador_referrals','rpc_ambassador_comment_work','rpc_ambassador_send_message','rpc_ambassador_resonance') ORDER BY proname;" -o json
