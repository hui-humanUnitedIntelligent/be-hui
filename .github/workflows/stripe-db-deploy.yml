name: Stripe DB Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.108.0/supabase_linux_amd64.tar.gz | tar -xz -C /tmp
          sudo mv /tmp/supabase /usr/local/bin/supabase

      - name: Link to Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref gxztrhvhcxhmunhhkfjd --yes

      - name: Deploy Stripe SQL (tables + RPCs)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -e
          supabase db query --linked -f stripe_integration.sql 2>&1
          echo "✅ SQL deployed"

      - name: Verify tables
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db query --linked "SELECT tablename FROM pg_tables WHERE schemaname='public' AND tablename LIKE 'stripe_%' ORDER BY tablename;" -o json

      - name: Verify RPCs
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db query --linked "SELECT proname FROM pg_proc WHERE proname IN ('rpc_create_stripe_customer','rpc_save_stripe_customer','rpc_record_payment','rpc_record_webhook','rpc_update_impact_pool','rpc_record_ambassador_commission','rpc_get_stripe_overview','rpc_get_stripe_payments','rpc_get_ambassador_earnings') ORDER BY proname;" -o json
