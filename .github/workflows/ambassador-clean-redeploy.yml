name: Ambassador Clean Redeploy

on:
  workflow_dispatch:

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.108.0/supabase_linux_amd64.tar.gz | tar -xz -C /tmp
          sudo mv /tmp/supabase /usr/local/bin/supabase
      - name: Link
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref gxztrhvhcxhmunhhkfjd --yes

      - name: Deploy clean
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db query --linked -f ambassador_clean_redeploy.sql 2>&1
          echo "Done"

      - name: DB verify
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db query --linked "
            SELECT n.nspname as schema, p.proname, 
                   pg_get_function_identity_arguments(p.oid) as args,
                   p.proacl
            FROM pg_proc p JOIN pg_namespace n ON p.pronamespace=n.oid
            WHERE p.proname IN ('rpc_get_ambassador_referrals','rpc_get_all_ambassadors')
          ;" -o json
