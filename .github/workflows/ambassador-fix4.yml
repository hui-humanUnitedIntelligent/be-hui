name: Ambassador Fix 4 — Drop All + Redeploy

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.108.0/supabase_linux_amd64.tar.gz | tar -xz -C /tmp
          sudo mv /tmp/supabase /usr/local/bin/supabase

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref gxztrhvhcxhmunhhkfjd --yes

      - name: Show all ambassador RPCs in pg_proc
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db query --linked "SELECT proname, oid::text, pg_get_function_identity_arguments(oid) as args FROM pg_proc WHERE proname LIKE '%ambassador%' OR proname = 'rpc_get_all_ambassadors' ORDER BY proname;" -o json

      - name: Drop ALL variants + Redeploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db query --linked -f ambassador_fix4.sql 2>&1 || true

      - name: Final verify
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db query --linked "SELECT proname, pg_get_function_identity_arguments(oid) as args FROM pg_proc WHERE proname IN ('rpc_get_ambassador_referrals','rpc_get_all_ambassadors') ORDER BY proname;" -o json
          supabase db query --linked "SELECT rpc_get_all_ambassadors();" -o json
