name: Stripe Additive Schema Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.108.0/supabase_linux_amd64.tar.gz | tar -xz -C /tmp
          sudo mv /tmp/supabase /usr/local/bin/supabase
      - name: Link
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref gxztrhvhcxhmunhhkfjd --yes
      - name: Deploy additive schema (indexes, stripe_charge_id, tier)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -e
          supabase db query --linked -f stripe_additive_schema.sql 2>&1
          echo "✅ SQL deployed"
      - name: Verify — Indizes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db query --linked "SELECT indexname FROM pg_indexes WHERE schemaname='public' AND indexname IN ('idx_stripe_payments_user_id','idx_stripe_payments_ambassador_id','idx_stripe_payments_status') ORDER BY indexname;" -o json
      - name: Verify — Neue Spalten
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db query --linked "SELECT table_name, column_name FROM information_schema.columns WHERE table_schema='public' AND ((table_name='stripe_payments' AND column_name='stripe_charge_id') OR (table_name='stripe_refunds' AND column_name='stripe_charge_id') OR (table_name='stripe_ambassador_commissions' AND column_name='tier'));" -o json
      - name: Verify — Bestehende RPCs unverändert vorhanden
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db query --linked "SELECT proname FROM pg_proc WHERE proname IN ('rpc_record_payment','rpc_record_refund','rpc_get_stripe_payments') ORDER BY proname;" -o json
