<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 160" fill="none" role="img" aria-label="HUI – Human United Intelligence">
  <defs>
    <radialGradient id="wm-sun" cx="45%" cy="35%" r="65%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FFE066"/>
      <stop offset="40%"  stop-color="#FFAF20"/>
      <stop offset="100%" stop-color="#FF7A00"/>
    </radialGradient>
    <radialGradient id="wm-sun-inner" cx="40%" cy="30%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FFE599"/>
      <stop offset="100%" stop-color="#FFB830"/>
    </radialGradient>
    <linearGradient id="wm-leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#5BE0C8"/>
      <stop offset="55%"  stop-color="#2EC9A6"/>
      <stop offset="100%" stop-color="#1AAB85"/>
    </linearGradient>
    <linearGradient id="wm-vein" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- Logo-Symbol (skaliert auf 140px Höhe, zentriert bei y=10) -->
  <g transform="translate(0, 0) scale(0.70)">
    <circle cx="95" cy="100" r="85" fill="url(#wm-sun)"/>
    <ellipse cx="88" cy="95" rx="66" ry="66" fill="url(#wm-sun-inner)" opacity="0.70"/>
    <path d="M 95 15 A 85 85 0 0 1 180 100 A 85 85 0 0 1 130 178 Q 110 190 95 185 Q 80 178 70 165 Q 50 140 40 110 Q 30 85 42 60 Q 55 35 80 20 Z"
          fill="#FF9A00" opacity="0.45"/>
    <path d="M 118 185 C 98 190 68 175 55 155 C 40 132 42 105 52 88 C 60 75 75 68 90 72 C 100 75 108 82 110 92 C 113 103 108 115 108 128 C 108 145 115 163 125 172 C 132 178 138 182 130 186 Z"
          fill="url(#wm-leaf)"/>
    <path d="M 82 82 C 88 92 94 108 96 125 C 98 140 96 160 100 175"
          stroke="url(#wm-vein)" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Wortmarke: "HUI" -->
  <text x="155" y="82"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="700"
        font-size="52"
        fill="#1C4A3E"
        letter-spacing="-1">HUI</text>

  <!-- Wortmarke: "Human United" -->
  <text x="157" y="112"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="400"
        font-size="18"
        fill="#1C4A3E"
        letter-spacing="0.5">Human United</text>

  <!-- Wortmarke: "Intelligence" -->
  <text x="157" y="135"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="400"
        font-size="18"
        fill="#1C4A3E"
        letter-spacing="0.5">Intelligence</text>
</svg>
