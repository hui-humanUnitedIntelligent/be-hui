<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="HUI Logo">
  <defs>
    <!-- Sonne: Orange-Gelb Radialverlauf — identisch mit Light, nur etwas satter -->
    <radialGradient id="sun-dark" cx="45%" cy="35%" r="65%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FFE066"/>
      <stop offset="40%"  stop-color="#FFAF20"/>
      <stop offset="100%" stop-color="#FF7A00"/>
    </radialGradient>
    <radialGradient id="sun-inner-dark" cx="40%" cy="30%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FFE599"/>
      <stop offset="100%" stop-color="#FFB830"/>
    </radialGradient>
    <!-- Blatt: identisch mit Light — originale Farben bleiben unverändert -->
    <linearGradient id="leaf-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#5BE0C8"/>
      <stop offset="55%"  stop-color="#2EC9A6"/>
      <stop offset="100%" stop-color="#1AAB85"/>
    </linearGradient>
    <linearGradient id="vein-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- Äußerer Sonnen-Kreis -->
  <circle cx="95" cy="100" r="85" fill="url(#sun-dark)"/>

  <!-- Innerer Sonnen-Bogen -->
  <ellipse cx="88" cy="95" rx="66" ry="66" fill="url(#sun-inner-dark)" opacity="0.70"/>

  <!-- Schatten-Schicht -->
  <path d="M 95 15
           A 85 85 0 0 1 180 100
           A 85 85 0 0 1 130 178
           Q 110 190 95 185
           Q 80 178 70 165
           Q 50 140 40 110
           Q 30 85 42 60
           Q 55 35 80 20
           Z"
        fill="#FF9A00" opacity="0.45"/>

  <!-- Blatt -->
  <path d="M 118 185
           C 98  190 68  175 55  155
           C 40  132 42  105 52  88
           C 60  75  75  68  90  72
           C 100 75  108 82  110 92
           C 113 103 108 115 108 128
           C 108 145 115 163 125 172
           C 132 178 138 182 130 186
           Z"
        fill="url(#leaf-dark)"/>

  <!-- Blattader -->
  <path d="M 82 82
           C 88 92 94 108 96 125
           C 98 140 96 160 100 175"
        stroke="url(#vein-dark)"
        stroke-width="4.5"
        stroke-linecap="round"
        fill="none"/>
</svg>
