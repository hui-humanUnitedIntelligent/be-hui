    <script>
    /* ─────────────────────────────────────────────────────────────
       HUI Chunk Recovery v2
       Fängt ab:
         • MIME-Type Fehler   ("text/html is not a valid JavaScript")
         • Chunk-Load-Fehler  ("Failed to fetch dynamically imported module")
         • Safari-spezifisch  ("Importing a module script failed")
         • ChunkLoadError     (Vite/Webpack chunk hash mismatch)
       Strategie:
         • Genau 1 controlled hard reload (sessionStorage-Flag)
         • Loop-Schutz: nach Reload kein weiterer Trigger
         • Nach erfolgreichem Load: Flag bereinigen
       ───────────────────────────────────────────────────────────── */
    (function() {
      var RELOAD_KEY = "hui_chunk_reload";
      var RELOAD_TS_KEY = "hui_chunk_reload_ts";

      function isChunkError(msg, src) {
        if (!msg && !src) return false;
        var text = (msg || "") + " " + (src || "");
        return (
          text.indexOf("text/html is not a valid JavaScript") !== -1 ||
          text.indexOf("MIME type") !== -1 ||
          text.indexOf("Failed to fetch dynamically imported module") !== -1 ||
          text.indexOf("Importing a module script failed") !== -1 ||
          text.indexOf("ChunkLoadError") !== -1 ||
          text.indexOf("Loading chunk") !== -1 ||
          text.indexOf("Loading CSS chunk") !== -1 ||
          text.indexOf("dynamically imported module") !== -1
        );
      }

      function doReload() {
        var now = Date.now();
        var lastTs = parseInt(sessionStorage.getItem(RELOAD_TS_KEY) || "0", 10);
        // Loop-Schutz: kein Reload wenn vor weniger als 10s schon einer lief
        if (sessionStorage.getItem(RELOAD_KEY) && (now - lastTs) < 10000) {
          sessionStorage.removeItem(RELOAD_KEY);
          sessionStorage.removeItem(RELOAD_TS_KEY);
          console.error("[HUI] Chunk error persists after reload — cache clear needed");
          return;
        }
        sessionStorage.setItem(RELOAD_KEY, "1");
        sessionStorage.setItem(RELOAD_TS_KEY, String(now));
        console.warn("[HUI] Chunk/MIME error detected — controlled reload");
        window.location.reload();
      }

      // ── window.onerror: synchrone Fehler (Safari, Firefox) ──
      var _prevOnerror = window.onerror;
      window.onerror = function(msg, src, line, col, err) {
        if (isChunkError(msg, src)) { doReload(); return true; }
        if (_prevOnerror) return _prevOnerror(msg, src, line, col, err);
        return false;
      };

      // ── window.addEventListener error: Script-Tag Fehler ──
      window.addEventListener("error", function(e) {
        var msg = (e && e.message) || "";
        var src = (e && e.filename) || "";
        if (isChunkError(msg, src)) { doReload(); }
      }, true); // capture phase — wichtig für Script-Load-Fehler

      // ── unhandledrejection: Promise-basierte import() Fehler ──
      window.addEventListener("unhandledrejection", function(e) {
        var reason = e && e.reason;
        var msg = (reason && (reason.message || String(reason))) || "";
        if (isChunkError(msg, "")) { e.preventDefault(); doReload(); }
      });

      // ── Erfolgreicher Load: Flags bereinigen ──
      window.addEventListener("load", function() {
        sessionStorage.removeItem(RELOAD_KEY);
        sessionStorage.removeItem(RELOAD_TS_KEY);
      });
    })();
  </script>

    <!-- ══ PWA: Service Worker + Apple Meta ══════════════════════ -->
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="apple-touch-icon" href="./hui-icon-192.png" />
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then(r => {
              console.log("[HUI SW] registriert:", r.scope);
              // SW-Update-Listener: wenn neuer SW aktiviert wird → Seite neu laden
              navigator.serviceWorker.addEventListener("message", (event) => {
                if (event.data && event.data.type === "SW_UPDATED") {
                  console.log("[HUI SW] Update erkannt — lade Seite neu...");
                  // Kurze Verzögerung damit SW komplett initialisiert ist
                  setTimeout(() => window.location.reload(true), 500);
                }
              });
            })
            .catch(e => console.warn("[HUI SW] Fehler:", e));
        });
      }
    </script>

    <!-- ══ iOS Safari Global Fixes ════════════════════════════ -->
    <style>
      /* Fix: 100dvh für iOS + Android (vermeidet Browser/System-Toolbar-Overlap) */
      :root { --app-height: 100dvh; }

      /* ── Safe-Area-Insets: 3-Ebenen-Strategie ──────────────────────────
         Level 1: --hui-safe-bottom — von Android via WindowInsetsCompat injiziert
                  (MainActivity.java liest echte Px aus, konvertiert zu dp, setzt als CSS-Var)
         Level 2: env(safe-area-inset-bottom) — nativ iOS/modernes Android (Capacitor)
         Level 3: 20px — Minimum-Puffer für Geräte ohne Edge-to-Edge

         :root-Default (0px) wird von MainActivity.java überschrieben sobald
         die echten Insets vorliegen (bei onCreate). iOS setzt env() nativ. */
      :root {
        --hui-safe-bottom: 0px;
        --hui-safe-top:    0px;
        --hui-safe-left:   0px;
        --hui-safe-right:  0px;
      }

      /* Zentrale Hilfsvariable — wird überall statt hartkodierten 72px genutzt */
      :root {
        --hui-nav-safe-bottom: max(
          var(--hui-safe-bottom, 0px),
          env(safe-area-inset-bottom, 20px),
          20px
        );
      }

      html, body {
        /* Verhindert ungewolltes Scrollen hinter System-Bars auf Android */
        overscroll-behavior: none;
      }

      /* Fix: Input/Select iOS eigenes Styling entfernen */
      input, textarea, select {
        -webkit-appearance: none;
        -moz-appearance: none;
             appearance: none;
        border-radius: 0;
      }

      /* Fix: overflow:hidden + border-radius auf iOS korrekt clippen */
      /* Note: WebkitMaskImage wird nur gezielt auf Karten-Container gesetzt */

      /* Fix: position:fixed Elemente sicher im safe-area Bereich */
      .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
      .safe-top    { padding-top:    env(safe-area-inset-top,    0px); }

      /* Fix: Tap-Highlight entfernen */
      * { -webkit-tap-highlight-color: transparent; }

      /* Fix: Text-Size anpassen verhindert automatische Skalierung auf iOS */
      body { -webkit-text-size-adjust: 100%; -moz-text-size-adjust: 100%; text-size-adjust: 100%; }

      /* Fix: Smooth Scrolling auf iOS */
      .hui-scroll { -webkit-overflow-scrolling: touch; }

      /* Fix: Gap in Flexbox — Fallback für iOS <14.5 */
      /* (wird durch Vite/PostCSS automatisch transpiliert) */

      /* Fix: Images immer GPU-composited rendern */
      img { transform: translateZ(0); }

      /* Fix: Verhindert weißen Flash beim Laden auf iOS */
      html { background: #FDFAF5; }
      body { background: #FDFAF5; margin: 0; }
    </style>
